name: Data Refresh & SSG Build

on:
  schedule:
    - cron: '0 */12 * * *' # Run every 12 hours automatically
  workflow_dispatch:       # Allow manual triggering from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push the JSON changes back
      id-token: write      # Best practice for generic workflows
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Scraper Dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run Scraper to Update Data
        run: python scraper/main.py

      - name: Commit and Push Updated Data
        # Committing the JSON file automatically triggers any connected hosting services (Vercel/Netlify)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/master_catalog.json
          git commit -m "chore: auto-update protein pricing and data" || echo "No changes to commit"
          git push
